<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Manager & Statement Ledger</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Navigation Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>LedgerApp</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" onclick="switchTab('dashboard')">📊 Dashboard & Statements</button>
                <button class="nav-item" onclick="switchTab('inventory')">📦 Inventory / Products</button>
                <button class="nav-item" onclick="switchTab('sales')">💰 Sales Entries</button>
                <button class="nav-item" onclick="switchTab('expenses')">📉 Expense Tracker</button>
                <button class="nav-item" onclick="switchTab('settings')">⚙️ Settings</button>
            </nav>
        </aside>

        <!-- Main Workspace Area -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="page-title">Dashboard & Statements</h1>
                <div class="session-status" id="session-badge">🔒 Session Locked</div>
            </header>

            <div id="content-area" class="content-wrapper">
                <!-- Dynamically populated via app.js -->
            </div>
        </main>
    </div>

    <!-- Passcode Verification Modal Overlay -->
    <div id="passcode-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-icon">🔐</div>
            <h3>Security Clearance Required</h3>
            <p>Enter your 4-digit passcode to perform this action.</p>
            <input type="password" id="passcode-input" maxlength="4" placeholder="••••" autocomplete="off">
            <div id="passcode-error" class="error-msg"></div>
            <div class="modal-actions">
                <button id="passcode-submit" class="btn-primary">Verify PIN</button>
                <button id="passcode-cancel" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
