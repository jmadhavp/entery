<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover enables safe-area-inset on notched phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Daily Inventory - Small Business Management</title>

    <!-- Theme color (changes browser chrome / status bar) -->
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#818cf8" media="(prefers-color-scheme: dark)">

    <!-- Stop iOS auto-linking numbers as phones -->
    <meta name="format-detection" content="telephone=no">

    <!-- iOS standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Daily Inventory">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Daily Inventory</h1>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            <div id="login-error"></div>
        </div>
    </div>

    <!-- Main App (Hidden Until Login) -->
    <div id="app" class="hidden">
        <header>
            <h1>Daily Inventory</h1>
            <div class="header-actions">
                <button id="theme-toggle">Toggle Theme</button>
                <div id="auth-container"></div>
            </div>
        </header>
        <nav id="sidebar">
            <ul id="nav-menu"></ul>
        </nav>
        <main id="content"></main>
    </div>
    <!-- Passcode Modal -->
    <div id="passcode-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Enter Passcode</h3>
            <input type="password" id="passcode-input" inputmode="numeric" maxlength="4" placeholder="____" />
            <div class="modal-actions">
                <button id="passcode-cancel">Cancel</button>
                <button id="passcode-submit">Submit</button>
            </div>
            <div id="passcode-error" class="error"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
